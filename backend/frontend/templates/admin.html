<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Boshqaruv - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#EF4444', dark: '#0F172A', sidebar: '#1E293B' } } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white font-['Inter'] h-screen overflow-hidden flex flex-col">
    
    <!-- Header -->
    <header class="h-16 border-b border-white/5 glass-nav flex items-center justify-between px-6 z-30 shrink-0">
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(147,51,234,0.4)]">
                <i class="fa-solid fa-shield-halved text-xl"></i>
            </div>
            <h1 class="font-bold tracking-wide">Admin Panel</h1>
        </div>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Chiqish
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <aside class="w-64 bg-sidebar/80 backdrop-blur-xl border-r border-white/5 flex flex-col z-20 shrink-0 py-6 px-4">
            <nav class="space-y-2">
                <a href="#stats" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white font-medium transition-colors" data-target="statsSection">
                    <i class="fa-solid fa-chart-pie w-5 text-center text-blue-400"></i>
                    Statistika
                </a>
                <a href="#users" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white font-medium transition-colors" data-target="usersSection">
                    <i class="fa-solid fa-users w-5 text-center text-green-400"></i>
                    Foydalanuvchilar
                </a>
                <a href="#brigades" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white font-medium transition-colors" data-target="brigadesSection">
                    <i class="fa-solid fa-truck-medical w-5 text-center text-red-400"></i>
                    Brigadalar
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8 relative">
            
            <!-- Stats Section -->
            <section id="statsSection" class="content-section fade-in">
                <h2 class="text-2xl font-bold mb-6">Tizim Statistikasi (Bugun)</h2>
                
                <div class="grid grid-cols-4 gap-6 mb-8">
                    <div class="glass-card p-6 rounded-3xl border border-white/10">
                        <div class="text-gray-400 text-sm mb-2 font-medium">Jami chaqiruvlar</div>
                        <div class="text-4xl font-bold text-white mb-2" id="statTotal">--</div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border border-white/10">
                        <div class="text-gray-400 text-sm mb-2 font-medium">Faol chaqiruvlar</div>
                        <div class="text-4xl font-bold text-blue-400 mb-2" id="statActive">--</div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border border-white/10">
                        <div class="text-gray-400 text-sm mb-2 font-medium">Bo'sh brigadalar</div>
                        <div class="text-4xl font-bold text-green-400 mb-2" id="statBrigades">--</div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border border-white/10">
                        <div class="text-gray-400 text-sm mb-2 font-medium">O'rtacha javob (daq)</div>
                        <div class="text-4xl font-bold text-purple-400 mb-2" id="statAvg">--</div>
                    </div>
                </div>
            </section>

            <!-- Users Section -->
            <section id="usersSection" class="content-section hidden fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Foydalanuvchilar</h2>
                </div>
                <div class="glass-card rounded-3xl border border-white/10 overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/5 border-b border-white/10">
                            <tr>
                                <th class="px-6 py-4 font-medium text-gray-400">ID / Ism</th>
                                <th class="px-6 py-4 font-medium text-gray-400">Telefon</th>
                                <th class="px-6 py-4 font-medium text-gray-400">Rol</th>
                                <th class="px-6 py-4 font-medium text-gray-400">Sana</th>
                                <th class="px-6 py-4 font-medium text-gray-400 text-right">Amal</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-white/5">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Brigades Section -->
            <section id="brigadesSection" class="content-section hidden fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Brigadalar</h2>
                    <button onclick="openBrigadeModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-colors">
                        <i class="fa-solid fa-plus mr-2"></i> Yangi qo'shish
                    </button>
                </div>
                <div class="grid grid-cols-3 gap-6" id="brigadesGrid">
                    <!-- Populated by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Brigade Modal -->
    <div id="brigadeModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="glass-card p-8 rounded-3xl max-w-sm w-full mx-4 border border-white/10 transform scale-95 transition-transform duration-300" id="brigadeModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Yangi Brigada</h3>
                <button onclick="closeBrigadeModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="brigadeForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Avtomobil raqami</label>
                    <input type="text" id="inputVehicle" required placeholder="01A123BC" class="w-full bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors uppercase">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Xizmat turi</label>
                    <select id="inputServiceType" class="w-full bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors text-white [&>option]:bg-dark">
                        <option value="">Umumiy (Barchasi)</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Boshlang'ich holat</label>
                    <select id="inputStatus" class="w-full bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors text-white [&>option]:bg-dark">
                        <option value="offline">Offline (Tizimda yo'q)</option>
                        <option value="available">Available (Bo'sh)</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all mt-2">
                    Saqlash
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
