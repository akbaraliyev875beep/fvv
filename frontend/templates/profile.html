<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#EF4444', dark: '#0F172A' } } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white font-['Inter'] min-h-screen">
    
    <!-- Header -->
    <header class="border-b border-white/10 glass-nav px-6 py-4 flex items-center justify-between sticky top-0 z-30">
        <div class="flex items-center gap-4">
            <a href="/" class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-xl font-bold">Mening Profilim</h1>
        </div>
        <div class="flex gap-4">
            <a href="/history" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm font-medium transition-colors">
                Chaqiruvlar tarixi
            </a>
            <button onclick="logout()" class="px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-lg text-sm font-medium transition-colors">
                Chiqish
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 mt-8 grid md:grid-cols-3 gap-8">
        
        <!-- Left Column: User Info -->
        <div class="md:col-span-1 space-y-6">
            <div class="glass-card p-6 rounded-3xl text-center border border-white/10">
                <div class="w-24 h-24 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold shadow-lg">
                    <span id="avatarInitials">U</span>
                </div>
                <h2 class="text-xl font-bold mb-1" id="userName">Yuklanmoqda...</h2>
                <p class="text-gray-400 text-sm mb-4" id="userRole">Foydalanuvchi</p>
                
                <div class="flex items-center justify-center gap-2 text-gray-300 bg-white/5 rounded-lg py-2">
                    <i class="fa-solid fa-phone text-xs"></i>
                    <span id="userPhone" class="font-mono text-sm">--</span>
                </div>
            </div>

            <!-- Main Info Form -->
            <div class="glass-card p-6 rounded-3xl border border-white/10">
                <h3 class="font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-user-pen text-blue-400"></i> Asosiy ma'lumotlar
                </h3>
                <form id="profileForm" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">To'liq ism</label>
                        <input type="text" id="inputName" class="w-full bg-black/20 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Telefon</label>
                        <input type="text" id="inputPhone" class="w-full bg-black/20 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <button type="submit" class="w-full py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm font-medium transition-colors">Saqlash</button>
                </form>
            </div>
        </div>

        <!-- Right Column: Medical Info -->
        <div class="md:col-span-2">
            <div class="glass-card p-8 rounded-3xl border border-white/10 h-full">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i class="fa-solid fa-notes-medical text-red-400"></i> Tibbiy varaqam
                    </h3>
                    <span class="text-xs text-gray-400">Tez yordam uchun muhim</span>
                </div>

                <form id="medicalForm" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Qon guruhi va rezus faktor</label>
                        <div class="grid grid-cols-4 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="A+" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-red-500 peer-checked:border-red-500 transition-colors font-bold">A(II)+</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="B+" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-red-500 peer-checked:border-red-500 transition-colors font-bold">B(III)+</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="AB+" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-red-500 peer-checked:border-red-500 transition-colors font-bold">AB(IV)+</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="O+" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-red-500 peer-checked:border-red-500 transition-colors font-bold">O(I)+</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="A-" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-colors font-bold">A(II)-</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="B-" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-colors font-bold">B(III)-</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="AB-" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-colors font-bold">AB(IV)-</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="blood_type" value="O-" class="peer sr-only">
                                <div class="text-center py-2 border border-white/10 rounded-lg peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-colors font-bold">O(I)-</div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Allergiyalar (vergul bilan ajrating)</label>
                        <input type="text" id="inputAllergies" placeholder="Masalan: Penisilin, asal..." class="w-full bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Surunkali kasalliklar</label>
                        <input type="text" id="inputChronic" placeholder="Masalan: Qandli diabet, astma..." class="w-full bg-black/20 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                    </div>

                    <div class="pt-4 border-t border-white/10">
                        <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(220,38,38,0.3)] hover:shadow-[0_0_25px_rgba(220,38,38,0.5)]">
                            Tibbiy ma'lumotlarni saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 right-6 glass-card p-4 rounded-xl border-l-4 border-green-500 shadow-xl transform translate-y-[200%] transition-transform duration-300 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-500"></i>
        <span id="toastMsg" class="font-medium">Saqlandi</span>
    </div>

    <script src="/static/js/profile.js"></script>
</body>
</html>
