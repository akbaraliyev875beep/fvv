<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#EF4444', dark: '#0F172A' } } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white font-['Inter'] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
    </div>

    <!-- Login Card -->
    <div class="glass-card max-w-md w-full rounded-3xl p-10 border border-white/10 relative z-10 shadow-2xl fade-in flex flex-col items-center text-center">
        
        <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.5)] mb-6">
            <i class="fa-solid fa-truck-medical text-3xl text-white"></i>
        </div>
        
        <h2 class="text-2xl font-bold mb-2">Tizimga kirish</h2>
        <p class="text-gray-400 text-sm mb-10">Tez yordam xizmatlaridan foydalanish uchun shaxsingizni tasdiqlang</p>
        
        <a href="/api/v1/auth/login/oneid" class="w-full py-4 px-6 bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all transform hover:scale-[1.02] shadow-[0_10px_20px_rgba(37,99,235,0.3)]">
            <i class="fa-solid fa-fingerprint text-xl text-blue-200"></i>
            <span>OneID orqali kirish</span>
        </a>
        
        <div class="mt-8 text-xs text-gray-500 flex items-center gap-2">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Ma'lumotlaringiz davlat standartida himoyalangan</span>
        </div>
        
        <a href="/" class="mt-8 text-sm text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-left mr-1"></i> Asosiy sahifaga qaytish
        </a>
    </div>

</body>
</html>
