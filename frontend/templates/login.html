<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - {{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#EF4444', dark: '#0F172A' } } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white font-['Inter'] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
    </div>

    <!-- Login Card -->
    <div class="glass-card max-w-md w-full rounded-3xl p-10 border border-white/10 relative z-10 shadow-2xl fade-in flex flex-col items-center text-center">
        
        <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.5)] mb-6">
            <i class="fa-solid fa-truck-medical text-3xl text-white"></i>
        </div>
        
        <h2 class="text-2xl font-bold mb-2">Tizimga kirish</h2>
        <p class="text-gray-400 text-sm mb-10">Tez yordam xizmatlaridan foydalanish uchun shaxsingizni tasdiqlang</p>
        
        <a href="/api/v1/auth/login/oneid" class="w-full py-3.5 px-6 bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all transform hover:scale-[1.02] shadow-[0_10px_20px_rgba(37,99,235,0.3)] mb-6">
            <i class="fa-solid fa-fingerprint text-xl text-blue-200"></i>
            <span>OneID orqali kirish</span>
        </a>

        <div class="relative w-full flex items-center justify-center mb-6">
            <div class="border-t border-white/10 w-full"></div>
            <span class="bg-dark px-3 text-xs text-gray-500 font-medium uppercase absolute">yoki Admin/Dispetcher</span>
        </div>

        <!-- Admin / Dispetcher Form -->
        <form id="adminLoginForm" class="w-full space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1.5">Login</label>
                <input type="text" id="adminUsername" required placeholder="aka" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1.5">Parol</label>
                <input type="password" id="adminPassword" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>
            <button type="submit" id="adminSubmitBtn" class="w-full py-3.5 px-6 bg-red-600 hover:bg-red-500 rounded-2xl font-bold transition-all text-white shadow-lg shadow-red-600/30">
                Admin Panelga Kirish
            </button>
            <div id="loginError" class="text-xs text-red-400 text-center hidden"></div>
        </form>

        <div class="mt-8 text-xs text-gray-500 flex items-center gap-2">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Ma'lumotlaringiz davlat standartida himoyalangan</span>
        </div>
        
        <a href="/" class="mt-6 text-sm text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-left mr-1"></i> Asosiy sahifaga qaytish
        </a>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('hidden');

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const res = await fetch('/api/v1/auth/admin/login', {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/admin';
                } else {
                    const err = await res.json();
                    errorDiv.textContent = err.detail || 'Login yoki parol noto\'g\'ri!';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Server bilan aloqa yo\'q';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
