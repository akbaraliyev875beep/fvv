version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tez_yordam_db
    restart: always
    environment:
      POSTGRES_USER: tez_yordam_user
      POSTGRES_PASSWORD: tez_yordam_pass
      POSTGRES_DB: tez_yordam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tez_yordam_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
    container_name: tez_yordam_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend # Mount frontend templates/static
    depends_on:
      - db
      - redis
    # Only exposing for debugging, normally NGINX is the entrypoint
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"

  nginx:
    image: nginx:alpine
    container_name: tez_yordam_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/static:/usr/share/nginx/html/static:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
